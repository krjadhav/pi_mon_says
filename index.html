<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIMON</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #F5F0E8;
    --black: #1A1A1A;
    --red: #D62828;
    --blue: #1D3557;
    --yellow: #F4A100;
    --teal: #2A9D8F;
    --orange: #E76F51;
    --pink: #E63946;
    --purple: #6A4C93;
    --green: #52B788;
    --sky: #457B9D;
    --sand: #C9ADA7;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--black);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 420px;
    margin: 0 auto;
    padding: 12px 12px 16px;
    position: relative;
  }

  /* --- Header --- */
  .header {
    text-align: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .logo {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    position: relative;
    display: inline-block;
  }

  .logo .pi-symbol {
    color: var(--red);
    font-size: 2.6rem;
    margin-right: 2px;
  }

  .subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-top: -2px;
  }

  /* --- Display area --- */
  .display-area {
    flex-shrink: 0;
    margin-bottom: 6px;
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .score-bar .score { color: var(--teal); font-weight: 700; font-size: 0.85rem; }
  .score-bar .best { color: var(--purple); font-weight: 700; font-size: 0.85rem; }

  .display {
    background: var(--black);
    border-radius: 16px;
    padding: 16px 20px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--red), var(--yellow), var(--teal), var(--blue), var(--purple));
  }

  .pi-sequence {
    font-size: 1.5rem;
    font-weight: 700;
    color: #555;
    letter-spacing: 0.12em;
    word-break: break-all;
    line-height: 1.5;
    min-height: 2.2em;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
  }

  .pi-sequence .digit {
    transition: color 0.15s;
    width: 0.85em;
    text-align: center;
  }

  .pi-sequence .digit.revealed { color: #aaa; }
  .pi-sequence .digit.current { color: #fff; font-size: 1.7rem; }
  .pi-sequence .digit.correct { color: var(--teal); }
  .pi-sequence .digit.wrong { color: var(--red); }
  .pi-sequence .digit.point { color: #666; width: 0.5em; }

  .message {
    font-size: 0.8rem;
    color: #888;
    margin-top: 6px;
    letter-spacing: 0.05em;
    min-height: 1.3em;
    text-align: center;
  }

  .message.error { color: var(--red); font-weight: 700; }
  .message.success { color: var(--teal); }

  /* --- Keypad --- */
  .keypad-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 8px;
    min-height: 0;
  }

  .row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .key {
    flex: 1;
    max-width: 110px;
    aspect-ratio: 1 / 0.82;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s, filter 0.12s, box-shadow 0.2s, background 0.2s;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    /* Dim "off" state — muted, desaturated */
    filter: saturate(0.3) brightness(0.55);
    box-shadow: 0 3px 0 rgba(0,0,0,0.15), 0 4px 8px rgba(0,0,0,0.08);
  }

  /* Lit up when pressed by user */
  .key:active, .key.pressed {
    transform: translateY(2px);
    filter: saturate(1) brightness(1.1);
    box-shadow: 0 1px 0 rgba(0,0,0,0.2), 0 0 20px 4px var(--key-glow, rgba(255,255,255,0.3));
  }

  /* Lit up during Simon playback hint */
  .key.flash {
    filter: saturate(1.2) brightness(1.25);
    transform: scale(1.05);
    box-shadow: 0 4px 0 rgba(0,0,0,0.15), 0 0 24px 6px var(--key-glow, rgba(255,255,255,0.4));
  }

  .key[data-digit="0"] { background: var(--red); color: #fff; --key-glow: rgba(214,40,40,0.5); }
  .key[data-digit="1"] { background: var(--blue); color: #fff; --key-glow: rgba(29,53,87,0.5); }
  .key[data-digit="2"] { background: var(--yellow); color: var(--black); --key-glow: rgba(244,161,0,0.5); }
  .key[data-digit="3"] { background: var(--teal); color: #fff; --key-glow: rgba(42,157,143,0.5); }
  .key[data-digit="4"] { background: var(--orange); color: #fff; --key-glow: rgba(231,111,81,0.5); }
  .key[data-digit="5"] { background: var(--pink); color: #fff; --key-glow: rgba(230,57,70,0.5); }
  .key[data-digit="6"] { background: var(--purple); color: #fff; --key-glow: rgba(106,76,147,0.5); }
  .key[data-digit="7"] { background: var(--green); color: #fff; --key-glow: rgba(82,183,136,0.5); }
  .key[data-digit="8"] { background: var(--sky); color: #fff; --key-glow: rgba(69,123,157,0.5); }
  .key[data-digit="9"] { background: var(--sand); color: var(--black); --key-glow: rgba(201,173,167,0.5); }

  .row-zero { justify-content: center; }
  .row-zero .key { max-width: 160px; aspect-ratio: 1.6 / 0.82; flex: 0 0 46%; }

  /* --- Action buttons --- */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    border: 2px solid var(--black);
    background: transparent;
    border-radius: 12px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn:active { background: var(--black); color: var(--bg); }
  .btn.primary { background: var(--black); color: var(--bg); }
  .btn.primary:active { background: #333; }

  /* --- Bauhaus decorative elements --- */
  .bauhaus-circle {
    position: absolute;
    width: 60px; height: 60px;
    border-radius: 50%;
    opacity: 0.06;
    pointer-events: none;
  }

  .bc1 { top: 10px; right: 20px; background: var(--red); width: 40px; height: 40px; }
  .bc2 { top: 70px; left: 10px; background: var(--yellow); width: 25px; height: 25px; }
  .bc3 { bottom: 30px; right: 10px; background: var(--blue); width: 50px; height: 50px; }

  /* --- Playback indicator --- */
  .playback-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.02);
    display: none;
    z-index: 10;
    pointer-events: all;
    border-radius: 14px;
  }

  .playback-overlay.active { display: block; }

  /* animations */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .display.shake { animation: shake 0.4s ease; }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(42,157,143,0); }
    50% { box-shadow: 0 0 20px 4px rgba(42,157,143,0.3); }
  }

  .display.glow { animation: pulse-glow 0.6s ease; }
</style>
</head>
<body>

<div class="app">
  <div class="bauhaus-circle bc1"></div>
  <div class="bauhaus-circle bc2"></div>
  <div class="bauhaus-circle bc3"></div>

  <header class="header">
    <div class="logo"><span class="pi-symbol">&pi;</span>MON</div>
    <div class="subtitle">memorize the infinite</div>
  </header>

  <div class="display-area">
    <div class="score-bar">
      <span>DIGIT <span class="score" id="score">0</span></span>
      <span>BEST <span class="best" id="best">0</span></span>
    </div>
    <div class="display" id="display">
      <div class="pi-sequence" id="sequence">
        <span class="digit point">3.</span>
      </div>
      <div class="message" id="message">press any digit to begin</div>
    </div>
  </div>

  <div class="keypad-area">
    <div class="playback-overlay" id="overlay"></div>
    <div class="row">
      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
    </div>
    <div class="row">
      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
    </div>
    <div class="row">
      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
    </div>
    <div class="row row-zero">
      <button class="key" data-digit="0">0</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn" id="replayBtn">REPLAY</button>
  </div>
</div>

<script>
// --- Pi digits (first 1000 after decimal point) ---
const PI = '1415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491298336733624406566430860213949463952247371907021798609437027705392171762931767523846748184676694051320005681271452635608277857713427577896091736371787214684409012249534301465495853710507922796892589235420199561121290219608640344181598136297747713099605187072113499999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577805321712268066130019278766111959092164201989';
const EMBEDDED_PI_LENGTH = PI.length;
const MAX_PI_DECIMALS = 100000;
const MAX_SEQUENCE_LENGTH = MAX_PI_DECIMALS + 1; // include leading "3"
const VISIBLE_SEQUENCE_DIGITS = 48;
const RUNTIME_TRIGGER_DIGITS = EMBEDDED_PI_LENGTH;
const RUNTIME_CHUNK_SIZE = 100;
let fullPi = `3${PI}`;
let piDigitsReady = fullPi.length;
let completedDigits = 0;
let piWorker;
let piWorkerUrl;
let piRequestCounter = 0;
const piRequestPromises = new Map();
const piPendingRequests = new Map();

// --- Audio engine ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Each digit gets a unique frequency on a pentatonic-ish scale
const DIGIT_FREQ = {
  0: 261.63, // C4
  1: 293.66, // D4
  2: 329.63, // E4
  3: 369.99, // F#4
  4: 415.30, // G#4
  5: 466.16, // Bb4
  6: 523.25, // C5
  7: 587.33, // D5
  8: 659.25, // E5
  9: 739.99, // F#5
};

function playTone(digit, duration = 0.18) {
  ensureAudio();
  const freq = DIGIT_FREQ[digit];
  const t = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, t);

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(freq * 4, t);

  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.35, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(t);
  osc.stop(t + duration + 0.01);
}

function playErrorSound() {
  ensureAudio();
  const t = audioCtx.currentTime;

  // Dissonant buzz
  [130, 138, 146].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.linearRampToValueAtTime(freq * 0.7, t + 0.5);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.02);
    osc.stop(t + 0.55);
  });
}

function playSuccessChime() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t + i * 0.1);
    gain.gain.setValueAtTime(0, t + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.2, t + i * 0.1 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.1);
    osc.stop(t + i * 0.1 + 0.35);
  });
}

function getPiDigitAt(index) {
  return fullPi[index];
}

function createPiWorker() {
  if (piWorker) return piWorker;

  const workerSource = `
    const MAX_PI_DECIMALS = ${MAX_PI_DECIMALS};
    const EXTRA_DIGITS = 16;
    const TERMS_PER_DIGIT = 14.181647462725477;
    const SCALE_DIGITS = MAX_PI_DECIMALS + EXTRA_DIGITS;
    const SCALE = 10n ** BigInt(SCALE_DIGITS);
    const SQRT_TERM = isqrt(10005n * SCALE * SCALE);

    let m = 1n;
    let l = 13591409n;
    let x = 1n;
    let k = 6n;
    let sum = l * SCALE;
    let computedTerms = 1;

    function isqrt(n) {
      if (n < 0n) throw new Error('square root of negative bigint');
      if (n < 2n) return n;
      let a = n;
      let b = (a + 1n) >> 1n;
      while (b < a) {
        a = b;
        b = (a + n / a) >> 1n;
      }
      return a;
    }

    function ensureTerms(targetDecimals) {
      const requiredTerms = Math.ceil(targetDecimals / TERMS_PER_DIGIT) + 2;
      for (let i = computedTerms; i < requiredTerms; i++) {
        const bigI = BigInt(i);
        m = (m * (k * k * k - 16n * k)) / (bigI * bigI * bigI);
        l += 545140134n;
        x *= -262537412640768000n;
        sum += ((m * l) * SCALE) / x;
        k += 12n;
      }
      computedTerms = Math.max(computedTerms, requiredTerms);
    }

    function computePiDecimals(targetDecimals) {
      ensureTerms(targetDecimals);
      const piScaled = (426880n * SQRT_TERM * SCALE) / sum;
      const piString = piScaled.toString();
      const integerDigits = piString.length - SCALE_DIGITS;
      const decimals = piString.slice(integerDigits, integerDigits + targetDecimals);
      return decimals.padEnd(targetDecimals, '0');
    }

    self.onmessage = (event) => {
      const { id, targetDecimals } = event.data;
      try {
        const digits = computePiDecimals(targetDecimals);
        self.postMessage({ id, targetDecimals, digits });
      } catch (error) {
        self.postMessage({ id, error: error instanceof Error ? error.message : String(error) });
      }
    };
  `;

  piWorkerUrl = URL.createObjectURL(new Blob([workerSource], { type: 'text/javascript' }));
  piWorker = new Worker(piWorkerUrl);
  piWorker.onmessage = (event) => {
    const { id, targetDecimals, digits, error } = event.data;
    const pending = piPendingRequests.get(id);
    if (!pending) return;
    piPendingRequests.delete(id);
    piRequestPromises.delete(targetDecimals);

    if (error) {
      pending.reject(new Error(error));
      return;
    }

    fullPi = `3${PI}${digits.slice(EMBEDDED_PI_LENGTH)}`;
    piDigitsReady = fullPi.length;
    pending.resolve(targetDecimals);
  };
  piWorker.onerror = (event) => {
    const error = new Error(event.message || 'pi worker failed');
    piPendingRequests.forEach(({ reject, targetDecimals }) => {
      piRequestPromises.delete(targetDecimals);
      reject(error);
    });
    piPendingRequests.clear();
    piRequestPromises.clear();
  };

  return piWorker;
}

function getChunkTargetDecimals(requiredLength) {
  const requiredDecimals = requiredLength - 1;
  if (requiredDecimals <= RUNTIME_TRIGGER_DIGITS) return RUNTIME_TRIGGER_DIGITS;

  const extraDecimals = requiredDecimals - RUNTIME_TRIGGER_DIGITS;
  const chunkCount = Math.ceil(extraDecimals / RUNTIME_CHUNK_SIZE);
  return Math.min(
    MAX_PI_DECIMALS,
    RUNTIME_TRIGGER_DIGITS + chunkCount * RUNTIME_CHUNK_SIZE
  );
}

async function ensurePiDigitsAvailable(requiredLength) {
  if (requiredLength <= piDigitsReady) return;
  if (requiredLength > MAX_SEQUENCE_LENGTH) {
    throw new Error(`Requested ${requiredLength} digits but only ${MAX_SEQUENCE_LENGTH} are supported.`);
  }
  if (requiredLength - 1 <= RUNTIME_TRIGGER_DIGITS) return;

  const targetDecimals = getChunkTargetDecimals(requiredLength);
  if (targetDecimals + 1 <= piDigitsReady) return;
  if (piRequestPromises.has(targetDecimals)) {
    await piRequestPromises.get(targetDecimals);
    return;
  }

  const worker = createPiWorker();
  const requestId = `pi-${++piRequestCounter}`;

  const requestPromise = new Promise((resolve, reject) => {
    piPendingRequests.set(requestId, { resolve, reject, targetDecimals });
    worker.postMessage({ id: requestId, targetDecimals });
  });
  piRequestPromises.set(targetDecimals, requestPromise);

  try {
    await requestPromise;
  } finally {
    piPendingRequests.delete(requestId);
  }
}

// --- Game state ---
let roundLength = 0;   // how many digits revealed so far (the "level")
let inputIndex = 0;    // which digit in the sequence the user is currently entering
let isPlaying = false;
let gameActive = false;
let bestScore = parseInt(localStorage.getItem('pimon-best') || '0');

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const sequenceEl = document.getElementById('sequence');
const messageEl = document.getElementById('message');
const displayEl = document.getElementById('display');
const overlay = document.getElementById('overlay');
const replayBtn = document.getElementById('replayBtn');
const keys = document.querySelectorAll('.key');

bestEl.textContent = bestScore;

// --- Rendering ---
function renderSequence(opts = {}) {
  let html = '';
  const visibleStart = Math.max(0, roundLength - VISIBLE_SEQUENCE_DIGITS);

  if (visibleStart > 0) {
    html += '<span class="digit revealed">…</span>';
  }

  for (let i = visibleStart; i < roundLength; i++) {
    const ch = getPiDigitAt(i) || '?';
    let cls = 'digit revealed';
    if (opts.highlightTo !== undefined && i < opts.highlightTo) cls = 'digit correct';
    if (opts.wrongAt === i) cls = 'digit wrong';
    html += `<span class="${cls}">${ch}</span>`;
    if (i === 0) html += `<span class="digit point">.</span>`;
  }
  if (gameActive && !isPlaying && opts.wrongAt === undefined) {
    html += `<span class="digit current">_</span>`;
  }
  sequenceEl.innerHTML = html || '<span class="digit point" style="color:#555">3.14159...</span>';
}

function updateScore() {
  scoreEl.textContent = completedDigits;
  if (completedDigits > bestScore) {
    bestScore = completedDigits;
    bestEl.textContent = bestScore;
    localStorage.setItem('pimon-best', bestScore);
  }
}

// --- Simon-style playback: plays the FULL current sequence ---
async function playSequence() {
  isPlaying = true;
  overlay.classList.add('active');

  try {
    if (roundLength > piDigitsReady) {
      messageEl.textContent = `computing next ${RUNTIME_CHUNK_SIZE} digits...`;
      messageEl.className = 'message';
    }
    await ensurePiDigitsAvailable(roundLength);
  } catch (error) {
    console.error(error);
    isPlaying = false;
    overlay.classList.remove('active');
    messageEl.textContent = 'runtime pi generation failed';
    messageEl.className = 'message error';
    gameActive = false;
    return;
  }

  messageEl.textContent = 'watch & listen...';
  messageEl.className = 'message';

  renderSequence();

  // Play every digit from 0 to roundLength-1
  for (let i = 0; i < roundLength; i++) {
    const d = parseInt(getPiDigitAt(i), 10);
    flashKey(d);
    playTone(d, 0.22);
    // Adaptive timing: faster for longer sequences
    const delay = roundLength <= 5 ? 420 : roundLength <= 12 ? 340 : 280;
    await sleep(delay);
  }

  await sleep(250);
  isPlaying = false;
  overlay.classList.remove('active');
  inputIndex = 0;
  messageEl.textContent = 'your turn — enter the sequence';
  messageEl.className = 'message';
  renderSequence();
}

function flashKey(digit) {
  const key = document.querySelector(`.key[data-digit="${digit}"]`);
  if (!key) return;
  key.classList.add('flash');
  setTimeout(() => key.classList.remove('flash'), 280);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// --- Game logic ---
function startGame() {
  roundLength = 1; // start with just "3"
  inputIndex = 0;
  completedDigits = 0;
  gameActive = true;
  updateScore();
  playSequence();
}

function handleDigitPress(digit) {
  ensureAudio();

  // Any key press starts the game if not active
  if (!gameActive && !isPlaying) {
    startGame();
    return;
  }

  if (isPlaying) return;

  const expected = parseInt(getPiDigitAt(inputIndex), 10);

  if (digit === expected) {
    // Correct digit
    playTone(digit, 0.15);
    flashKey(digit);

    inputIndex++;

    // Show progress
    renderSequence({ highlightTo: inputIndex });

    if (inputIndex >= roundLength) {
      // Completed the full sequence for this round.
      completedDigits = Math.max(0, roundLength - 1);
      updateScore();

      if (completedDigits >= MAX_PI_DECIMALS) {
        playSuccessChime();
        messageEl.textContent = `congrats you've memorized ${MAX_PI_DECIMALS.toLocaleString()} digits`;
        messageEl.className = 'message success';
        gameActive = false;
        return;
      }

      roundLength++;
      if (completedDigits >= RUNTIME_TRIGGER_DIGITS) {
        ensurePiDigitsAvailable(roundLength).catch((error) => {
          console.error(error);
        });
      }

      // Milestone chime every 10 digits
      if (completedDigits > 0 && completedDigits % 10 === 0) {
        displayEl.classList.add('glow');
        setTimeout(() => displayEl.classList.remove('glow'), 600);
        playSuccessChime();
        messageEl.textContent = `${completedDigits} digits!`;
        messageEl.className = 'message success';
        setTimeout(() => {
          if (gameActive) playSequence();
        }, 1000);
      } else {
        setTimeout(() => {
          if (gameActive) playSequence();
        }, 500);
      }
    }
  } else {
    // Wrong!
    playErrorSound();

    renderSequence({ wrongAt: inputIndex });

    displayEl.classList.add('shake');
    setTimeout(() => displayEl.classList.remove('shake'), 400);

    messageEl.textContent = `wrong! expected ${expected} — you got ${completedDigits} digits`;
    messageEl.className = 'message error';
    gameActive = false;
  }
}

// --- Replay current sequence ---
function replaySequence() {
  if (!gameActive || isPlaying) return;
  playSequence();
}

// --- Event listeners ---
keys.forEach(key => {
  const digit = parseInt(key.dataset.digit);

  key.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    key.classList.add('pressed');
    handleDigitPress(digit);
  });

  key.addEventListener('pointerup', () => key.classList.remove('pressed'));
  key.addEventListener('pointerleave', () => key.classList.remove('pressed'));
});

replayBtn.addEventListener('click', () => {
  ensureAudio();
  replaySequence();
});

// Keyboard support
document.addEventListener('keydown', (e) => {
  const d = parseInt(e.key);
  if (!isNaN(d) && d >= 0 && d <= 9) {
    const key = document.querySelector(`.key[data-digit="${d}"]`);
    if (key) key.classList.add('pressed');
    handleDigitPress(d);
  }
  if (e.key === 'Enter' || e.key === ' ') {
    ensureAudio();
    if (!gameActive) startGame();
    else replaySequence();
  }
});

document.addEventListener('keyup', (e) => {
  const d = parseInt(e.key);
  if (!isNaN(d)) {
    const key = document.querySelector(`.key[data-digit="${d}"]`);
    if (key) key.classList.remove('pressed');
  }
});

// Prevent double-tap zoom on mobile
document.addEventListener('touchend', (e) => {
  if (e.target.closest('.key, .btn')) e.preventDefault();
}, { passive: false });

window.addEventListener('beforeunload', () => {
  if (piWorker) piWorker.terminate();
  if (piWorkerUrl) URL.revokeObjectURL(piWorkerUrl);
});
</script>
