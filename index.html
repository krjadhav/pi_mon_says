<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIMON</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Mono:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #ffffff;
    --black: #000000;
    --display-bg: #181a1b;
    --key-red: #c73b3f;
    --key-orange: #c86341;
    --key-amber: #f8a83a;
    --key-green: #40c16a;
    --key-teal: #3ac3a1;
    --key-blue: #31a2c3;
    --key-navy: #2c5ec1;
    --key-pink: #c5449e;
    --key-purple: #9c49c1;
    --key-indigo: #5d49c1;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Roboto', sans-serif;
    color: var(--black);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 420px;
    margin: 0 auto;
    padding: 24px 16px 16px;
    position: relative;
  }

  /* --- Header --- */
  .header {
    text-align: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    position: relative;
    display: inline-block;
    background: var(--black);
    color: var(--bg);
    padding: 4px 16px 6px;
    line-height: 1.1;
    border: 3px solid var(--black);
  }

  .logo .pi-symbol {
    font-family: 'Times New Roman', Georgia, serif;
    font-size: 3rem;
    font-style: italic;
    vertical-align: baseline;
  }

  .subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-top: -2px;
  }

  /* --- Display area --- */
  .display-area {
    flex-shrink: 0;
    margin-bottom: 0;
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .score-bar .score { color: var(--key-teal); font-weight: 700; font-size: 0.85rem; }
  .score-bar .best { color: var(--key-purple); font-weight: 700; font-size: 0.85rem; }

  .display {
    background: var(--display-bg);
    border-radius: 0;
    padding: 20px 24px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    position: relative;
    overflow: hidden;
  }

  .display::before {
    display: none;
  }

  .pi-sequence {
    font-size: 2.25rem;
    font-weight: 400;
    color: #555;
    letter-spacing: 0.05em;
    word-break: break-all;
    line-height: 1.4;
    min-height: 1.5em;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    width: 100%;
  }

  .pi-sequence .digit {
    transition: color 0.15s;
    width: auto;
    text-align: center;
  }

  .pi-sequence .digit.revealed { color: #aaa; }
  .pi-sequence .digit.current { color: #fff; font-size: 2.5rem; }
  .pi-sequence .digit.correct { color: var(--key-teal); }
  .pi-sequence .digit.wrong { color: var(--key-red); }
  .pi-sequence .digit.point { color: #888; width: auto; }

  .message {
    font-size: 0.8rem;
    color: #888;
    margin-top: 8px;
    letter-spacing: 0.05em;
    min-height: 1.3em;
    text-align: right;
    width: 100%;
  }

  .message.error { color: var(--key-red); font-weight: 700; }
  .message.success { color: var(--key-teal); }

  .start-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin: 20px 0 6px;
  }

  .start-hint {
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #777;
    text-align: center;
  }

  .icon-btn {
    flex: 0 0 auto;
    width: 56px;
    min-width: 56px;
    padding: 10px;
    font-size: 1.5rem;
    line-height: 1;
  }

  /* --- Keypad --- */
  .keypad-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 0;
    min-height: 0;
    position: relative;
    border: 1px solid var(--black);
    border-top: none;
  }

  .row {
    display: flex;
    gap: 0;
    justify-content: center;
  }

  .key {
    flex: 1;
    max-width: none;
    aspect-ratio: 1 / 0.83;
    border: 1px solid var(--black);
    border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 2.25rem;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, filter 0.1s, box-shadow 0.15s;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    color: var(--black);
    filter: none;
    box-shadow: none;
  }

  /* Lit up when pressed by user */
  .key:active, .key.pressed {
    transform: scale(0.96);
    filter: brightness(1.2);
    box-shadow: inset 0 0 20px rgba(255,255,255,0.3);
  }

  /* Lit up during Simon playback hint */
  .key.flash {
    filter: brightness(1.3) saturate(1.2);
    transform: scale(1.03);
    box-shadow: 0 0 20px 4px var(--key-glow, rgba(255,255,255,0.3));
  }

  .key[data-digit="7"] { background: var(--key-red); --key-glow: rgba(199,59,63,0.5); }
  .key[data-digit="8"] { background: var(--key-orange); --key-glow: rgba(200,99,65,0.5); }
  .key[data-digit="9"] { background: var(--key-amber); --key-glow: rgba(248,168,58,0.5); }
  .key[data-digit="4"] { background: var(--key-green); --key-glow: rgba(64,193,106,0.5); }
  .key[data-digit="5"] { background: var(--key-teal); --key-glow: rgba(58,195,161,0.5); }
  .key[data-digit="6"] { background: var(--key-blue); --key-glow: rgba(49,162,195,0.5); }
  .key[data-digit="1"] { background: var(--key-navy); --key-glow: rgba(44,94,193,0.5); }
  .key[data-digit="2"] { background: var(--key-pink); --key-glow: rgba(197,68,158,0.5); }
  .key[data-digit="3"] { background: var(--key-purple); --key-glow: rgba(156,73,193,0.5); }
  .key[data-digit="0"] { background: var(--key-indigo); --key-glow: rgba(93,73,193,0.5); }

  .row-zero { justify-content: center; }
  .row-zero .key { flex: 1; max-width: none; aspect-ratio: auto; padding: 18px 0; }

  /* --- Action buttons --- */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    border: 2px solid var(--black);
    background: transparent;
    border-radius: 0;
    padding: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    padding-top: 20px;
  }

  .btn:active { background: var(--black); color: var(--bg); }
  .btn.primary { background: var(--black); color: var(--bg); }
  .btn.primary:active { background: #333; }

  /* --- Game board (display + keypad wrapper) --- */
  .game-board {
    display: flex;
    flex-direction: column;
    position: relative;
    transition: box-shadow 0.4s ease;
    box-shadow: 0px 4px 4px 5px rgba(0,0,0,0.25);
  }

  /* --- Player turn indicator glow (static dark) --- */
  .game-board.player-turn {
    box-shadow: 0 0 30px 12px rgba(0,0,0,0.5), 0 4px 16px 6px rgba(0,0,0,0.35);
  }

  /* --- Hover highlight on keys --- */
  .key:hover {
    filter: brightness(1.25);
    z-index: 1;
  }

  /* --- Green glow on correct sequence --- */
  @keyframes correct-glow {
    0% { box-shadow: 0 0 15px 6px rgba(0,0,0,0.35); }
    20% { box-shadow: 0 0 50px 20px rgba(64,193,106,0.7), 0 0 80px 40px rgba(64,193,106,0.3); }
    100% { box-shadow: 0px 4px 4px 5px rgba(0,0,0,0.25); }
  }

  .game-board.correct-flash {
    animation: correct-glow 1s ease-out;
  }

  /* --- Playback indicator --- */
  .playback-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.02);
    display: none;
    z-index: 10;
    pointer-events: all;
  }

  .playback-overlay.active { display: block; }

  /* animations */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .display.shake { animation: shake 0.4s ease; }

  .display.glow { /* handled by game-board correct-flash now */ }

  .app.awaiting-start .keypad-area,
  .app.awaiting-start .actions {
    display: none;
  }

  .app:not(.awaiting-start) .start-panel {
    display: none;
  }

  @media (min-width: 768px) {
    .app {
      justify-content: center;
      padding-top: 24px;
      padding-bottom: 24px;
    }

    .display-area {
      margin-bottom: 0;
    }

    .keypad-area {
      flex: 0 0 auto;
      justify-content: flex-start;
    }

    .actions {
      margin-top: 14px;
    }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo"><span class="pi-symbol">πimon</span></div>
    <div class="subtitle"></div>
  </header>

  <div class="display-area">
    <div class="score-bar">
      <span>DIGIT <span class="score" id="score">0</span></span>
      <span>BEST <span class="best" id="best">0</span></span>
    </div>
    <div class="game-board" id="gameBoard">
      <div class="display" id="display">
        <div class="pi-sequence" id="sequence">
          <span class="digit point">3.</span>
        </div>
        <div class="message" id="message"></div>
      </div>

      <div class="keypad-area">
        <div class="playback-overlay" id="overlay"></div>
        <div class="row">
          <button class="key" data-digit="7">7</button>
          <button class="key" data-digit="8">8</button>
          <button class="key" data-digit="9">9</button>
        </div>
        <div class="row">
          <button class="key" data-digit="4">4</button>
          <button class="key" data-digit="5">5</button>
          <button class="key" data-digit="6">6</button>
        </div>
        <div class="row">
          <button class="key" data-digit="1">1</button>
          <button class="key" data-digit="2">2</button>
          <button class="key" data-digit="3">3</button>
        </div>
        <div class="row row-zero">
          <button class="key" data-digit="0">0</button>
        </div>
      </div>
    </div>
  </div>

  <div class="start-panel" id="startPanel">
    <button class="btn primary" id="startBtn">START GAME</button>
    <div class="start-hint"></div>
  </div>

  <div class="actions">
    <button class="btn icon-btn" id="replayBtn" aria-label="Replay sequence" title="Replay sequence" style="display:none;">&#8635;</button>
  </div>
</div>

<script>
// --- Pi digits (first 1000 after decimal point) ---
const PI = '1415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491298336733624406566430860213949463952247371907021798609437027705392171762931767523846748184676694051320005681271452635608277857713427577896091736371787214684409012249534301465495853710507922796892589235420199561121290219608640344181598136297747713099605187072113499999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577805321712268066130019278766111959092164201989';
const EMBEDDED_PI_LENGTH = PI.length;
const MAX_PI_DECIMALS = 100000;
const MAX_SEQUENCE_LENGTH = MAX_PI_DECIMALS + 1; // include leading "3"
const VISIBLE_SEQUENCE_DIGITS = 48;
const RUNTIME_TRIGGER_DIGITS = EMBEDDED_PI_LENGTH;
const RUNTIME_CHUNK_SIZE = 100;
let fullPi = `3${PI}`;
let piDigitsReady = fullPi.length;
let completedDigits = 0;
let piWorker;
let piWorkerUrl;
let piRequestCounter = 0;
const piRequestPromises = new Map();
const piPendingRequests = new Map();
let playerTurnActive = false;
let awaitingStart = true;
let startPanelMode = 'start';

// --- Audio engine ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Each digit gets a unique frequency on a pentatonic-ish scale
const DIGIT_FREQ = {
  0: 261.63, // C4
  1: 293.66, // D4
  2: 329.63, // E4
  3: 369.99, // F#4
  4: 415.30, // G#4
  5: 466.16, // Bb4
  6: 523.25, // C5
  7: 587.33, // D5
  8: 659.25, // E5
  9: 739.99, // F#5
};

function playTone(digit, duration = 0.18) {
  ensureAudio();
  const freq = DIGIT_FREQ[digit];
  const t = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, t);

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(freq * 4, t);

  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.35, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(t);
  osc.stop(t + duration + 0.01);
}

function playErrorSound() {
  ensureAudio();
  const t = audioCtx.currentTime;

  // Dissonant buzz
  [130, 138, 146].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.linearRampToValueAtTime(freq * 0.7, t + 0.5);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.02);
    osc.stop(t + 0.55);
  });
}

function playSuccessChime() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t + i * 0.1);
    gain.gain.setValueAtTime(0, t + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.2, t + i * 0.1 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.1);
    osc.stop(t + i * 0.1 + 0.35);
  });
}

function playPraiseSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [659.25, 783.99].forEach((freq, i) => {
    const start = t + i * 0.08;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.14, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.22);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + 0.24);
  });
}

function getPiDigitAt(index) {
  return fullPi[index];
}

function resetPiWorker() {
  if (piWorker) {
    piWorker.terminate();
    piWorker = null;
  }
  if (piWorkerUrl) {
    URL.revokeObjectURL(piWorkerUrl);
    piWorkerUrl = null;
  }
}

function failPendingPiRequests(workerError) {
  piPendingRequests.forEach(({ reject, targetDecimals }, pendingId) => {
    piRequestPromises.delete(targetDecimals);
    reject(workerError);
    piPendingRequests.delete(pendingId);
  });
}

function createPiWorker() {
  if (piWorker) return piWorker;

  const workerSource = `
    const MAX_PI_DECIMALS = ${MAX_PI_DECIMALS};
    const EXTRA_DIGITS = 16;
    const TERMS_PER_DIGIT = 14.181647462725477;
    const SCALE_DIGITS = MAX_PI_DECIMALS + EXTRA_DIGITS;
    const SCALE = 10n ** BigInt(SCALE_DIGITS);
    const SQRT_TERM = isqrt(10005n * SCALE * SCALE);

    let m = 1n;
    let l = 13591409n;
    let x = 1n;
    let k = 6n;
    let sum = l * SCALE;
    let computedTerms = 1;

    function isqrt(n) {
      if (n < 0n) throw new Error('square root of negative bigint');
      if (n < 2n) return n;
      let a = n;
      let b = (a + 1n) >> 1n;
      while (b < a) {
        a = b;
        b = (a + n / a) >> 1n;
      }
      return a;
    }

    function ensureTerms(targetDecimals) {
      const requiredTerms = Math.ceil(targetDecimals / TERMS_PER_DIGIT) + 2;
      for (let i = computedTerms; i < requiredTerms; i++) {
        const bigI = BigInt(i);
        m = (m * (k * k * k - 16n * k)) / (bigI * bigI * bigI);
        l += 545140134n;
        x *= -262537412640768000n;
        sum += ((m * l) * SCALE) / x;
        k += 12n;
      }
      computedTerms = Math.max(computedTerms, requiredTerms);
    }

    function computePiDecimals(targetDecimals) {
      ensureTerms(targetDecimals);
      const piScaled = (426880n * SQRT_TERM * SCALE) / sum;
      const piString = piScaled.toString();
      const integerDigits = piString.length - SCALE_DIGITS;
      const decimals = piString.slice(integerDigits, integerDigits + targetDecimals);
      return decimals.padEnd(targetDecimals, '0');
    }

    self.onmessage = (event) => {
      const { id, targetDecimals } = event.data;
      try {
        const digits = computePiDecimals(targetDecimals);
        self.postMessage({ id, targetDecimals, digits });
      } catch (error) {
        self.postMessage({ id, error: error instanceof Error ? error.message : String(error) });
      }
    };
  `;

  piWorkerUrl = URL.createObjectURL(new Blob([workerSource], { type: 'text/javascript' }));
  piWorker = new Worker(piWorkerUrl);
  piWorker.onmessage = (event) => {
    const { id, targetDecimals, digits, error } = event.data;
    const pending = piPendingRequests.get(id);
    if (!pending) return;
    piPendingRequests.delete(id);
    piRequestPromises.delete(targetDecimals);

    if (error) {
      const workerError = new Error(error);
      resetPiWorker();
      pending.reject(workerError);
      failPendingPiRequests(workerError);
      return;
    }

    fullPi = `3${PI}${digits.slice(EMBEDDED_PI_LENGTH)}`;
    piDigitsReady = fullPi.length;
    pending.resolve(targetDecimals);
  };
  piWorker.onerror = (event) => {
    const workerError = new Error(event.message || 'pi worker failed');
    resetPiWorker();
    failPendingPiRequests(workerError);
  };

  return piWorker;
}

function getChunkTargetDecimals(requiredLength) {
  const requiredDecimals = requiredLength - 1;
  if (requiredDecimals <= RUNTIME_TRIGGER_DIGITS) return RUNTIME_TRIGGER_DIGITS;

  const extraDecimals = requiredDecimals - RUNTIME_TRIGGER_DIGITS;
  const chunkCount = Math.ceil(extraDecimals / RUNTIME_CHUNK_SIZE);
  return Math.min(
    MAX_PI_DECIMALS,
    RUNTIME_TRIGGER_DIGITS + chunkCount * RUNTIME_CHUNK_SIZE
  );
}

async function ensurePiDigitsAvailable(requiredLength) {
  if (requiredLength <= piDigitsReady) return;
  if (requiredLength > MAX_SEQUENCE_LENGTH) {
    throw new Error(`Requested ${requiredLength} digits but only ${MAX_SEQUENCE_LENGTH} are supported.`);
  }
  if (requiredLength - 1 <= RUNTIME_TRIGGER_DIGITS) return;

  const targetDecimals = getChunkTargetDecimals(requiredLength);
  if (targetDecimals + 1 <= piDigitsReady) return;
  if (piRequestPromises.has(targetDecimals)) {
    await piRequestPromises.get(targetDecimals);
    return;
  }

  const worker = createPiWorker();
  const requestId = `pi-${++piRequestCounter}`;

  const requestPromise = new Promise((resolve, reject) => {
    piPendingRequests.set(requestId, { resolve, reject, targetDecimals });
    worker.postMessage({ id: requestId, targetDecimals });
  });
  piRequestPromises.set(targetDecimals, requestPromise);

  try {
    await requestPromise;
  } finally {
    piPendingRequests.delete(requestId);
  }
}

// I think we got a stable game!

// --- Game state ---
let roundLength = 0;   // how many digits revealed so far (the "level")
let inputIndex = 0;    // which digit in the sequence the user is currently entering
let isPlaying = false;
let gameActive = false;
let bestScore = parseInt(localStorage.getItem('pimon-best') || '0');

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const sequenceEl = document.getElementById('sequence');
const messageEl = document.getElementById('message');
const displayEl = document.getElementById('display');
const gameBoardEl = document.getElementById('gameBoard');
const appEl = document.querySelector('.app');
const overlay = document.getElementById('overlay');
const replayBtn = document.getElementById('replayBtn');
const startPanel = document.getElementById('startPanel');
const startBtn = document.getElementById('startBtn');
const keys = document.querySelectorAll('.key');

bestEl.textContent = bestScore;

function syncStartUi() {
  appEl.classList.toggle('awaiting-start', awaitingStart);
  startPanel.hidden = !awaitingStart;
  if (startPanelMode === 'retry') {
    startBtn.textContent = 'TRY AGAIN  ⏎';
    messageEl.textContent = ``;
    messageEl.className = 'message error';
    const hintEl = startPanel.querySelector('.start-hint');
    if (hintEl) hintEl.textContent = '';
    return;
  }

  startBtn.textContent = 'START GAME ⏎';
  messageEl.textContent = '';
  messageEl.className = 'message';
  const hintEl = startPanel.querySelector('.start-hint');
  if (hintEl) hintEl.textContent = '';
}

// --- Rendering ---
function renderSequence(opts = {}) {
  let html = '';
  const hideDigits =
    opts.hideDigits === true ||
    (playerTurnActive && opts.reveal !== true && opts.wrongAt === undefined);

  if (hideDigits) {
    sequenceEl.innerHTML = '<span class="digit current">_</span>';
    return;
  }

  const visibleStart = Math.max(0, roundLength - VISIBLE_SEQUENCE_DIGITS);

  if (visibleStart > 0) {
    html += '<span class="digit revealed">…</span>';
  }

  for (let i = visibleStart; i < roundLength; i++) {
    const ch = getPiDigitAt(i) || '?';
    let cls = 'digit revealed';
    if (opts.highlightTo !== undefined && i < opts.highlightTo) cls = 'digit correct';
    if (opts.wrongAt === i) cls = 'digit wrong';
    html += `<span class="${cls}">${ch}</span>`;
    if (i === 0) html += `<span class="digit point">.</span>`;
  }
  if (gameActive && !isPlaying && opts.wrongAt === undefined) {
    html += `<span class="digit current">_</span>`;
  }
  sequenceEl.innerHTML = html || '<span class="digit point" style="color:#555">3.14159...</span>';
}

function updateScore() {
  scoreEl.textContent = completedDigits;
  if (completedDigits > bestScore) {
    bestScore = completedDigits;
    bestEl.textContent = bestScore;
    localStorage.setItem('pimon-best', bestScore);
  }
}

// --- Simon-style playback: plays the FULL current sequence ---
async function playSequence() {
  isPlaying = true;
  playerTurnActive = false;
  overlay.classList.add('active');
  gameBoardEl.classList.remove('player-turn');

  try {
    if (roundLength > piDigitsReady) {
      messageEl.textContent = `computing next ${RUNTIME_CHUNK_SIZE} digits...`;
      messageEl.className = 'message';
    }
    await ensurePiDigitsAvailable(roundLength);
  } catch (error) {
    console.error(error);
    isPlaying = false;
    overlay.classList.remove('active');
    messageEl.textContent = 'runtime pi generation failed';
    messageEl.className = 'message error';
    gameActive = false;
    return;
  }

  messageEl.textContent = '';
  messageEl.className = 'message';

  renderSequence({ reveal: true });

  // Play every digit from 0 to roundLength-1
  for (let i = 0; i < roundLength; i++) {
    const d = parseInt(getPiDigitAt(i), 10);
    flashKey(d);
    playTone(d, 0.22);
    // Adaptive timing: faster for longer sequences
    const delay = roundLength <= 5 ? 420 : roundLength <= 12 ? 340 : 280;
    await sleep(delay);
  }

  await sleep(250);
  isPlaying = false;
  playerTurnActive = true;
  overlay.classList.remove('active');
  gameBoardEl.classList.add('player-turn');
  inputIndex = 0;
  messageEl.textContent = '';
  messageEl.className = 'message';
  renderSequence({ hideDigits: true });
}

function flashKey(digit) {
  const key = document.querySelector(`.key[data-digit="${digit}"]`);
  if (!key) return;
  key.classList.add('flash');
  setTimeout(() => key.classList.remove('flash'), 280);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// --- Game logic ---
function startGame() {
  roundLength = 1; // start with just "3"
  inputIndex = 0;
  completedDigits = 0;
  playerTurnActive = false;
  awaitingStart = false;
  startPanelMode = 'start';
  gameActive = true;
  syncStartUi();
  updateScore();
  playSequence();
}

function handleDigitPress(digit) {
  if (!gameActive && !isPlaying) {
    ensureAudio();
    startGame();
    return;
  }

  if (isPlaying) return;
  ensureAudio();

  const expected = parseInt(getPiDigitAt(inputIndex), 10);

  if (digit === expected) {
    // Correct digit
    playTone(digit, 0.15);
    flashKey(digit);

    inputIndex++;

    // Keep the sequence hidden during the player's turn.
    renderSequence({ hideDigits: true });

    if (inputIndex >= roundLength) {
      // Completed the full sequence for this round.
      completedDigits = Math.max(0, roundLength - 1);
      updateScore();
      gameBoardEl.classList.remove('player-turn');
      gameBoardEl.classList.remove('correct-flash');
      void gameBoardEl.offsetWidth; // force reflow to restart animation
      gameBoardEl.classList.add('correct-flash');
      setTimeout(() => gameBoardEl.classList.remove('correct-flash'), 1000);

      if (completedDigits >= MAX_PI_DECIMALS) {
        playSuccessChime();
        messageEl.textContent = `congrats you've memorized ${MAX_PI_DECIMALS.toLocaleString()} digits`;
        messageEl.className = 'message success';
        playerTurnActive = false;
        gameActive = false;
        return;
      }

      // playPraiseSound();
      roundLength++;
      playerTurnActive = false;
      if (completedDigits >= RUNTIME_TRIGGER_DIGITS) {
        ensurePiDigitsAvailable(roundLength).catch((error) => {
          console.error(error);
        });
      }

      const gainedDigits = 1;
      if (completedDigits > 0 && completedDigits % 10 === 0) {
        gameBoardEl.classList.remove('correct-flash');
        void gameBoardEl.offsetWidth;
        gameBoardEl.classList.add('correct-flash');
        playSuccessChime();
        messageEl.textContent = `great! +${gainedDigits} digit — ${completedDigits} total`;
        messageEl.className = 'message success';
        setTimeout(() => {
          if (gameActive) playSequence();
        }, 1000);
      } else {
        // messageEl.textContent = `nice! +${gainedDigits} digit — ${completedDigits} total`;
        // messageEl.className = 'message success';
        setTimeout(() => {
          if (gameActive) playSequence();
        }, 500);
      }
    }
  } else {
    // Wrong!
    playErrorSound();
    gameBoardEl.classList.remove('player-turn');

    playerTurnActive = false;
    renderSequence({ wrongAt: inputIndex, reveal: true });

    displayEl.classList.add('shake');
    setTimeout(() => displayEl.classList.remove('shake'), 400);

    gameActive = false;
    awaitingStart = true;
    startPanelMode = 'retry';
    syncStartUi();
  }
}

// --- Replay current sequence ---
function replaySequence() {
  if (!gameActive || isPlaying) return;
  playSequence();
}

// --- Event listeners ---
keys.forEach(key => {
  const digit = parseInt(key.dataset.digit);

  key.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (isPlaying) return;
    key.classList.add('pressed');
    handleDigitPress(digit);
  });

  key.addEventListener('pointerup', () => key.classList.remove('pressed'));
  key.addEventListener('pointerleave', () => key.classList.remove('pressed'));
});

replayBtn.addEventListener('click', () => {
  ensureAudio();
  replaySequence();
});

startBtn.addEventListener('click', () => {
  ensureAudio();
  startGame();
});

// Keyboard support
document.addEventListener('keydown', (e) => {
  const d = parseInt(e.key);
  if (!isNaN(d) && d >= 0 && d <= 9) {
    if (isPlaying) return;
    const key = document.querySelector(`.key[data-digit="${d}"]`);
    if (key) key.classList.add('pressed');
    handleDigitPress(d);
    return;
  }
  if (e.key === 'Enter' || e.key === ' ') {
    if (isPlaying) {
      e.preventDefault();
      return;
    }
    ensureAudio();
    if (!gameActive) startGame();
    else replaySequence();
  }
});

document.addEventListener('keyup', (e) => {
  const d = parseInt(e.key);
  if (!isNaN(d)) {
    const key = document.querySelector(`.key[data-digit="${d}"]`);
    if (key) key.classList.remove('pressed');
  }
});

// Prevent double-tap zoom on mobile (only on keypad keys, not action buttons)
document.addEventListener('touchend', (e) => {
  if (e.target.closest('.key')) e.preventDefault();
}, { passive: false });

window.addEventListener('beforeunload', () => {
  resetPiWorker();
});

syncStartUi();
</script>

</body>
</html>
